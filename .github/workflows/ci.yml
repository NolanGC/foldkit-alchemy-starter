name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run format:check
      - run: bun run lint
      - run: bun run build

  # Generates starter apps from the templates and installs/typechecks them —
  # catches starter-repo changes that break create-foldkit-alchemy-app.
  create-app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run --cwd packages/create-foldkit-alchemy-app test

  test:
    runs-on: ubuntu-latest
    # All test runs share the "test" stage (and now shared remote state), so
    # they must not deploy/destroy concurrently. Queue instead of cancel:
    # killing a run mid-deploy is exactly how resources get stranded.
    concurrency:
      group: integ-test
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run test
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_WORKERS_SUBDOMAIN: nolangc
          CI: true
