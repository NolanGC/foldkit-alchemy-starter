name: Deploy Staging

on:
  push:
    branches: [main]

# Every push to main deploys the same "staging" stage against shared remote
# state. Overlapping deploys race on Durable Object class migrations (and
# other worker metadata) and can leave the worker unable to bind its own
# classes. Queue instead of cancel: killing a run mid-deploy is exactly how
# resources get stranded.
concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun alchemy deploy --stage staging --yes
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_WORKERS_SUBDOMAIN: nolangc
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
